  "12-20": [{ name: "Saint Dominic of Silos", titles: "Abbot", era: "c. 1000\u20131073", region: "Navarre / Castile", tags: ["Confessor"], bio: "Dominic of Silos was a Spanish Benedictine monk and abbot of the monastery of Silos in Castile, which he transformed into one of the great centers of Romanesque art and learning in medieval Spain. He was venerated for ransoming captives from the Moors. The pregnant Queen Isabella I of Castile reportedly prayed before his statue for a safe delivery \u2014 and in gratitude named her son Dominic, who became the future Emperor Charles V.", quote: "Give what you have; God will give you what you lack.", quoteAttr: "Attributed to Saint Dominic of Silos" }],
  "12-21": [{ name: "Saint Peter Canisius", titles: "Priest and Doctor of the Church (traditional calendar)", era: "1521\u20131597", region: "Holland / Germany", tags: ["Doctor of the Church"], bio: "In the traditional calendar, Saint Peter Canisius is commemorated on December 21. A Dutch Jesuit, he was the most important figure in the Catholic Reformation in German-speaking lands, founding colleges and writing catechisms that educated generations of Catholics. His feast is April 27 in the reformed calendar.", quote: "Do not wish to be anything other than what you are, and try to be that perfectly.", quoteAttr: "Saint Peter Canisius" }],
  "12-22": [{ name: "Saint Frances Xavier Cabrini", titles: "Virgin (traditional calendar)", era: "1850\u20131917", region: "Italy / United States", tags: ["Confessor"], bio: "In some calendars Saint Frances Xavier Cabrini is commemorated on December 22, the anniversary of her death. The first American citizen to be canonized, she founded sixty-seven institutions across the United States, South America, and Europe in service of Italian immigrants and the poor.", quote: "My Jesus, I am going to work for you.", quoteAttr: "Saint Frances Xavier Cabrini" }],
  "12-23": [{ name: "Saint John of Kanty", titles: "Priest and Professor", era: "1390\u20131473", region: "Kenty / Krak\u00f3w, Poland", tags: ["Confessor"], bio: "John of Kanty (Cantius) was a Polish priest and professor of theology at the Jagiellonian University in Krak\u00f3w for most of his adult life. He was known for his extraordinary charity to the poor \u2014 he reportedly gave away everything he owned multiple times \u2014 and for his deep humility in the face of academic success. He was canonized by Pope Clement XIII in 1767.", quote: "Fight all errors, but do it with good humor, patience, kindness, and love.", quoteAttr: "Saint John of Kanty" }],
  "12-24": [{ name: "Saint Adela of Pfalzel", titles: "Abbess", era: "c. 670\u2013734", region: "Germany", tags: ["Confessor"], bio: "Adela was a Frankish noblewoman, granddaughter of Saint Dagobert I, who founded the monastery of Pfalzel near Trier after being widowed. She was the grandmother of Saint Gregory of Utrecht. She is venerated on Christmas Eve as a model of the consecrated life lived in proximity to the mystery of the Incarnation.", quote: "To receive Christ, one must become nothing.", quoteAttr: "Attributed to Saint Adela of Pfalzel" }],
  "12-25": [{ name: "The Nativity of the Lord", titles: "Solemnity \u2014 Christmas, Holy Day of Obligation", era: "c. 4\u20136 BC", region: "Bethlehem", tags: [], bio: "The greatest feast of the Christian year celebrates the birth of the Son of God in the stable at Bethlehem, born of the Virgin Mary, wrapped in swaddling clothes and laid in a manger. God became man. The Word became flesh. The mystery that angels sing and shepherds rush to see, that wise men cross deserts to find \u2014 this is the center of all human history.", quote: "For to you is born this day in the city of David a Savior, who is Christ the Lord.", quoteAttr: "Luke 2:11" }],
  "12-26": [{ name: "Saint Stephen", titles: "First Martyr, Protomartyr", era: "1st century", region: "Jerusalem", tags: ["Martyr"], bio: "The day after Christmas the Church venerates the first Christian martyr. Stephen was one of the seven original deacons of Jerusalem, chosen to serve the poor. He was stoned to death outside Jerusalem after delivering a speech before the Sanhedrin. Saul of Tarsus \u2014 the future Paul \u2014 watched over the cloaks of those who stoned him.", quote: "Lord Jesus, receive my spirit. Lord, do not hold this sin against them.", quoteAttr: "Acts 7:59\u201360 (Saint Stephen\u2019s dying words)" }],
  "12-27": [{ name: "Saint John", titles: "Apostle and Evangelist, the Beloved Disciple", era: "c. 6\u2013100", region: "Galilee / Ephesus", tags: ["Confessor"], bio: "The only one of the Twelve not to die a martyr \u2014 or rather, the only one for whom all attempted martyrdoms failed \u2014 John was the beloved disciple who reclined next to Jesus at the Last Supper, stood at the foot of the Cross, ran to the tomb, and received the Blessed Virgin into his care. He wrote the fourth Gospel, three epistles, and the Apocalypse. He died in Ephesus in extreme old age.", quote: "Little children, love one another.", quoteAttr: "Saint John the Apostle, traditional last words" }],
  "12-28": [{ name: "The Holy Innocents", titles: "Martyrs", era: "c. 4\u20136 BC", region: "Bethlehem", tags: ["Martyr"], bio: "Two days after Christmas, the Church mourns the infant boys of Bethlehem massacred by Herod the Great in his attempt to eliminate the newborn King of the Jews. Matthew records that Herod ordered the killing of all male children two years old and under in and around Bethlehem. The Church has always venerated them as martyrs \u2014 the first to die for Christ, before they could know him.", quote: "A voice was heard in Ramah, sobbing and loud lamentation; Rachel weeping for her children.", quoteAttr: "Matthew 2:18 (citing Jeremiah 31:15)" }],
  "12-29": [{ name: "Saint Thomas Becket", titles: "Archbishop of Canterbury, Martyr", era: "c. 1118\u20131170", region: "Canterbury, England", tags: ["Martyr"], bio: "Thomas Becket was Archbishop of Canterbury who came into fierce conflict with King Henry II over the rights of the Church. On December 29, 1170, four knights entered Canterbury Cathedral and cut him down at the altar. He died with the words: I am ready to die for my Lord, that in my blood the Church may obtain liberty and peace. He was canonized within three years of his death.", quote: "I am ready to die for my Lord, that in my blood the Church may obtain liberty and peace.", quoteAttr: "Saint Thomas Becket, dying words" }],
  "12-30": [{ name: "The Holy Family of Jesus, Mary, and Joseph", titles: "Feast", era: "1st century", region: "Nazareth", tags: [], bio: "Celebrated on the Sunday within the octave of Christmas, the feast of the Holy Family holds up the household of Nazareth as the model of all Christian families. The hidden years of Jesus\u2019s childhood \u2014 spent in obedience, labor, and love under one roof with Mary and Joseph \u2014 are the sanctification of ordinary domestic life.", quote: "He went down with them and came to Nazareth, and was obedient to them.", quoteAttr: "Luke 2:51" }],
  "12-31": [{ name: "Saint Sylvester I", titles: "Pope", era: "d. 335", region: "Rome", tags: ["Confessor"], bio: "Sylvester I was Bishop of Rome during the reign of Constantine the Great and presided over the Roman Church during the Council of Nicaea in 325, though he was represented by legates rather than attending in person. He is credited with receiving the Donation of Constantine \u2014 though the document is a medieval forgery \u2014 and his pontificate marked the beginning of the Church\u2019s transition from a persecuted minority to the religion of the Empire. The evening of his feast day, New Year\u2019s Eve, is called Saint Sylvester\u2019s Night across much of Europe.", quote: "The age of martyrs has passed; the age of confessors has begun.", quoteAttr: "Attributed to Saint Sylvester I" }]
};

const COLLECTS = {
  1:  "Grant us, O Lord, as we begin this new year, the grace to serve you faithfully, that we may come at last to that eternal joy which you have promised to those who love you.",
  2:  "O God, whose Son was presented in the Temple and recognized as the glory of your people, grant us so to walk in your light that we may come to behold your face in glory.",
  3:  "Almighty God, you strengthen the weak, lift up the fallen, and turn sinners into saints. Grant us this day the grace to do your will with joy.",
  4:  "Lord Jesus, risen and glorified, fill us with the joy of your Resurrection. May we who are baptized into your death also share in your eternal life.",
  5:  "O God, who in your goodness call all who are weary and burdened to come to your Son, grant that we may hear his voice and find rest for our souls.",
  6:  "Lord, as summer comes upon us, do not let the heat of our cares extinguish the fire of your love in our hearts. May we burn with charity for you and for our neighbors.",
  7:  "O God, who reveal yourself in the silence of prayer and in the community of the faithful, grant us wisdom to seek you, courage to follow you, and love to serve you.",
  8:  "Grant us, O Lord, the intercession of your blessed Mother and all your saints, that the light of the Transfiguration may shine in our hearts and lead us on the path to heaven.",
  9:  "Lord, as the days shorten and the harvest is gathered, fill our hearts with gratitude. We thank you for the light of faith, the communion of your Church, and the promise of eternal life.",
  10: "Almighty God, whose saints shine before us as a great cloud of witnesses, grant us so to walk in their company that we may inherit with them the Kingdom you have prepared.",
  11: "Lord of life and death, in this month when we remember both your saints in glory and our beloved dead in hope of resurrection, keep our eyes fixed on you, the resurrection and the life.",
  12: "Come, Lord Jesus. In this season of holy waiting, purify our hearts and make them ready to receive you — you who come as a helpless Child and who will come again as the King of glory."
};

function getLiturgicalSeason(month, day) {
  const d = month * 100 + day;
  if (d >= 1201 && d <= 1224) return "Advent";
  if (d >= 1225 || d <= 113)  return "Christmas Time";
  if (d >= 114  && d <= 221)  return "Ordinary Time";
  if (d >= 222  && d <= 406)  return "Lent";
  if (d >= 407  && d <= 522)  return "Easter Time";
  return "Ordinary Time";
}

let offset = 0;
const today = new Date();

function getTargetDate() {
  const d = new Date(today);
  d.setDate(d.getDate() + offset);
  return d;
}

function formatDate(d) {
  return d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
}

function padKey(m, d) {
  return String(m).padStart(2,'0') + '-' + String(d).padStart(2,'0');
}

function changeDay(dir) {
  offset += dir;
  render();
}

function jumpToDate(val) {
  if (!val) return;
  const parts = val.split('-');
  const picked = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  const diff = Math.round((picked - today) / 86400000);
  offset = diff;
  render();
}

function render() {
  const d = getTargetDate();
  const month = d.getMonth() + 1;
  const day   = d.getDate();
  const key   = padKey(month, day);

  document.getElementById('dateDisplay').textContent = formatDate(d);
  document.getElementById('liturgicalSeason').textContent = getLiturgicalSeason(month, day);

  // sync date picker
  const dp = document.getElementById('datePicker');
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd2 = String(d.getDate()).padStart(2,'0');
  dp.value = yyyy+'-'+mm+'-'+dd2;

  const lbl = document.getElementById('browseLabel');
  if (offset === 0) lbl.textContent = 'Today';
  else if (offset === -1) lbl.textContent = 'Yesterday';
  else if (offset === 1) lbl.textContent = 'Tomorrow';
  else lbl.textContent = formatDate(d).split(',')[0];

  document.getElementById('prevBtn').disabled = offset < -60;
  document.getElementById('nextBtn').disabled = offset > 60;

  const saints = SAINTS[key];
  const list = document.getElementById('saintsList');
  list.innerHTML = '';

  const CORNERS = ['✝', '☩', '✶', '⚜'];

  if (!saints || saints.length === 0) {
    const covered = month <= 3;
    list.innerHTML = covered
      ? '<div class="no-saints">No principal feast recorded for this date.<br>Pray for the unnamed holy ones.</div>'
      : '<div class="no-saints">Saints for this month are coming soon.<br>Currently covering January – March.</div>';
  } else {
    saints.forEach((s, i) => {
      const tags = s.tags.map(t => `<span class="meta-pill ${t === 'Martyr' ? 'martyred' : ''}">${t}</span>`).join('');
      const card = document.createElement('div');
      card.className = 'saint-card';
      card.innerHTML = `
        <div class="card-corner">${CORNERS[i % CORNERS.length]}</div>
        <div class="saint-feast-tag">Feast · ${formatDate(d).replace(/^\w+, /, '')}</div>
        <h2 class="saint-name">${s.name}</h2>
        <div class="saint-titles">${s.titles}</div>
        <div class="saint-divider"></div>
        <p class="saint-bio">${s.bio}</p>
        ${s.quote ? `<div class="saint-quote-block"><div class="saint-quote">“${s.quote}”</div><div class="saint-quote-attr">— ${s.quoteAttr}</div></div>` : ''}
        <div class="saint-meta">
          ${s.era    ? `<span class="meta-pill">${s.era}</span>` : ''}
          ${s.region ? `<span class="meta-pill">${s.region}</span>` : ''}
          ${tags}
        </div>
      `;
      list.appendChild(card);
    });
  }

  const prayerEl = document.getElementById('prayerSection');
  const collect = COLLECTS[month];
  prayerEl.innerHTML = `
    <div class="prayer-label">Collect for ${d.toLocaleDateString('en-US', {month: 'long'})}</div>
    <p class="prayer-text">${collect}</p>
  `;

  const noteEl = document.getElementById('coverageNote');
  noteEl.textContent = month <= 3 ? 'Currently covering January – March · More months coming soon' : '';
}

render();
</script>
</body>
</html>
