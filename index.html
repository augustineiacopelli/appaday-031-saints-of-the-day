<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Saints of the Day — AppADay #031</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --midnight: #0b0e1a;
    --deep-navy: #111524;
    --navy: #161b2e;
    --border: #2a3050;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dim: #7a6030;
    --ivory: #f0e8d5;
    --ivory-dim: #b8a98a;
    --ivory-faint: #6b5f4a;
    --crimson: #8b1a1a;
    --crimson-light: #c43232;
    --text: #e8dfc8;
    --text-dim: #8a7f6a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { min-height: 100%; background: var(--midnight); color: var(--text); font-family: 'Cormorant Garamond', Georgia, serif; overflow-x: hidden; }
  body {
    background: radial-gradient(ellipse at 20% 0%, rgba(201,168,76,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(139,26,26,0.08) 0%, transparent 50%),
                linear-gradient(180deg, #0b0e1a 0%, #0d1020 50%, #0b0e1a 100%);
    min-height: 100dvh;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.35; pointer-events: none; z-index: 0;
  }
  .container { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding: 0 20px 60px; }
  .site-header { text-align: center; padding: 48px 0 32px; border-bottom: 1px solid var(--border); margin-bottom: 40px; position: relative; }
  .site-header::after { content: '✶'; position: absolute; bottom: -11px; left: 50%; transform: translateX(-50%); background: var(--midnight); padding: 0 12px; color: var(--gold-dim); font-size: 14px; letter-spacing: 2px; }
  .app-label { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 4px; color: var(--gold-dim); text-transform: uppercase; margin-bottom: 14px; }
  .site-title { font-family: 'Cinzel', serif; font-size: clamp(26px, 6vw, 40px); font-weight: 500; color: var(--gold-light); letter-spacing: 3px; line-height: 1.2; margin-bottom: 8px; }
  .site-subtitle { font-family: 'IM Fell English', Georgia, serif; font-style: italic; font-size: 15px; color: var(--ivory-dim); letter-spacing: 0.5px; }
  .date-display { text-align: center; margin-bottom: 44px; }
  .date-full { font-family: 'Cinzel', serif; font-size: clamp(13px, 3vw, 16px); letter-spacing: 3px; color: var(--ivory-dim); text-transform: uppercase; }
  .liturgical-season { display: inline-block; margin-top: 10px; font-family: 'IM Fell English', serif; font-style: italic; font-size: 14px; color: var(--gold-dim); border: 1px solid var(--border); padding: 3px 14px; border-radius: 2px; }
  .browse-bar { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 40px; }
  .browse-btn { background: none; border: 1px solid var(--border); color: var(--ivory-dim); font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; padding: 8px 16px; cursor: pointer; transition: all 0.2s; }
  .browse-btn:hover { border-color: var(--gold-dim); color: var(--gold-light); }
  .browse-btn:disabled { opacity: 0.3; cursor: default; }
  .browse-label { font-family: 'IM Fell English', serif; font-style: italic; font-size: 14px; color: var(--ivory-faint); min-width: 160px; text-align: center; }
  .saints-list { display: flex; flex-direction: column; gap: 32px; }
  .saint-card { background: linear-gradient(135deg, rgba(22,27,46,0.9) 0%, rgba(17,21,36,0.95) 100%); border: 1px solid var(--border); border-top: 2px solid var(--gold-dim); padding: 32px 28px 28px; position: relative; animation: fadeUp 0.6s ease both; }
  .saint-card:nth-child(2) { animation-delay: 0.1s; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .saint-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
  .card-corner { position: absolute; top: 12px; right: 16px; font-size: 20px; opacity: 0.25; }
  .saint-feast-tag { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 3px; color: var(--gold-dim); text-transform: uppercase; margin-bottom: 10px; }
  .saint-name { font-family: 'Cormorant Garamond', serif; font-size: clamp(24px, 5vw, 34px); font-weight: 500; color: var(--ivory); line-height: 1.15; margin-bottom: 4px; }
  .saint-titles { font-family: 'IM Fell English', serif; font-style: italic; font-size: 14px; color: var(--gold-dim); margin-bottom: 20px; letter-spacing: 0.3px; }
  .saint-divider { width: 40px; height: 1px; background: linear-gradient(90deg, var(--gold-dim), transparent); margin-bottom: 18px; }
  .saint-bio { font-size: 16px; line-height: 1.75; color: var(--ivory-dim); font-weight: 300; margin-bottom: 22px; }
  .saint-quote-block { border-left: 2px solid var(--gold-dim); padding: 12px 18px; background: rgba(201,168,76,0.04); margin-bottom: 20px; }
  .saint-quote { font-family: 'IM Fell English', serif; font-style: italic; font-size: 17px; line-height: 1.6; color: var(--ivory); }
  .saint-quote-attr { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 2px; color: var(--gold-dim); text-transform: uppercase; margin-top: 8px; }
  .saint-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 18px; }
  .meta-pill { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--ivory-faint); border: 1px solid var(--border); padding: 4px 10px; border-radius: 1px; }
  .meta-pill.martyred { color: var(--crimson-light); border-color: rgba(139,26,26,0.4); }
  .prayer-section { margin-top: 52px; text-align: center; padding: 32px 20px; border: 1px solid var(--border); position: relative; background: rgba(201,168,76,0.02); }
  .prayer-section::before, .prayer-section::after { content: '✶  ✶  ✶'; position: absolute; left: 50%; transform: translateX(-50%); font-size: 10px; letter-spacing: 8px; color: var(--gold-dim); background: var(--midnight); padding: 0 12px; }
  .prayer-section::before { top: -8px; }
  .prayer-section::after { bottom: -8px; }
  .prayer-label { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 4px; color: var(--gold-dim); text-transform: uppercase; margin-bottom: 16px; }
  .prayer-text { font-family: 'IM Fell English', serif; font-style: italic; font-size: 17px; line-height: 1.8; color: var(--ivory-dim); max-width: 480px; margin: 0 auto; }
  .coverage-note { margin-top: 20px; font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 2px; color: var(--ivory-faint); text-transform: uppercase; text-align: center; }
  .no-saints { text-align: center; padding: 60px 0; color: var(--ivory-faint); font-style: italic; font-size: 18px; line-height: 1.7; }
  .site-footer { margin-top: 56px; padding-top: 24px; border-top: 1px solid var(--border); text-align: center; }
  .footer-nav { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; }
  .footer-nav a { color: var(--gold-dim); text-decoration: none; transition: color 0.2s; }
  .footer-nav a:hover { color: var(--gold-light); }
  .footer-tag { margin-top: 10px; font-size: 12px; color: var(--ivory-faint); font-family: 'Cormorant Garamond', serif; font-style: italic; }

  .date-picker-bar { display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
  .date-picker-wrap { position: relative; display: inline-block; }
  .date-picker-label { display: block; background: none; border: 1px solid var(--border); color: var(--ivory-faint); font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; padding: 6px 14px; cursor: pointer; transition: all 0.2s; pointer-events: none; }
  .date-picker-wrap:hover .date-picker-label { border-color: var(--gold-dim); color: var(--gold-light); }
  #datePicker { position: absolute; inset: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
</style>
</head>
<body>
<div class="container">
  <header class="site-header">
    <div class="app-label">AppADay · 031</div>
    <h1 class="site-title">Saints of the Day</h1>
    <p class="site-subtitle">A daily companion to the Roman Martyrology</p>
  </header>
  <div class="date-display">
    <div class="date-full" id="dateDisplay"></div>
    <div class="liturgical-season" id="liturgicalSeason"></div>
  </div>
  <div class="date-picker-bar">
    <div class="date-picker-wrap">
      <span class="date-picker-label">Jump to Date ▾</span>
      <input type="date" id="datePicker" onchange="jumpToDate(this.value)">
    </div>
  </div>
  <div class="browse-bar">
    <button class="browse-btn" id="prevBtn" onclick="changeDay(-1)">← Prev</button>
    <div class="browse-label" id="browseLabel">Today</div>
    <button class="browse-btn" id="nextBtn" onclick="changeDay(1)">Next →</button>
  </div>
  <div class="saints-list" id="saintsList"></div>
  <div class="prayer-section" id="prayerSection"></div>
  <p class="coverage-note" id="coverageNote"></p>
  <footer class="site-footer">
    <div class="footer-nav"><a href="https://augustineiacopelli.github.io/appaday/">PORTFOLIO</a></div>
    <div class="footer-tag">AppADay · June 7, 2026</div>
  </footer>
</div>
<script>
const SAINTS = {
  "01-01": [{ name: "Mary, Mother of God", titles: "Solemnity · Holy Day of Obligation", era: "1st century", region: "Palestine", tags: [], bio: "On the octave day of Christmas the Church venerates the Blessed Virgin Mary under her highest title: Theotokos, God-bearer, defined at the Council of Ephesus in 431 AD. This feast proclaims that Mary’s son is truly God Incarnate and celebrates the gift of the Holy Name of Jesus, conferred at his circumcision.", quote: "My soul proclaims the greatness of the Lord, and my spirit rejoices in God my Savior.", quoteAttr: "Luke 1:46–47" }],
  "01-02": [{ name: "Saints Basil the Great and Gregory Nazianzen", titles: "Bishops and Doctors of the Church", era: "4th century", region: "Cappadocia", tags: ["Doctor of the Church"], bio: "Lifelong friends and the two greatest theologians of their age, Basil and Gregory together defined the doctrine of the Trinity against the Arian heresy. Basil wrote the monastic Rule that still governs Eastern monasticism and championed the full divinity of the Holy Spirit. Gregory, called the Theologian, presided over the First Council of Constantinople in 381 and delivered the orations that fixed Trinitarian orthodoxy for all subsequent centuries.", quote: "The Holy Spirit is not a servant but a Lord; not a creature but God.", quoteAttr: "Saint Basil the Great, On the Holy Spirit" }],
  "01-03": [{ name: "The Most Holy Name of Jesus", titles: "Optional Memorial", era: "1st century", region: "Nazareth", tags: [], bio: "The name Jesus — Yeshua in Hebrew, meaning God saves — was given by the angel Gabriel before the Incarnation and formally conferred at the circumcision eight days after Christmas. Saint Bernardine of Siena popularized the IHS monogram devotion in the 15th century. At the name of Jesus, Saint Paul writes, every knee shall bend in heaven, on earth, and under the earth.", quote: "There is no other name under heaven given to the human race by which we are to be saved.", quoteAttr: "Acts 4:12" }],
  "01-04": [{ name: "Saint Elizabeth Ann Seton", titles: "Widow, Founder of the American Sisters of Charity", era: "1774–1821", region: "New York / Maryland", tags: ["Confessor"], bio: "Born into a prominent Episcopalian family in New York, Elizabeth Ann Seton was widowed at twenty-nine with five children. Her conversion to Catholicism cost her social standing and much of her family support. She founded the first free Catholic school in America and established the Sisters of Charity of Saint Joseph’s, the first native American religious community. She was canonized by Pope Paul VI in 1975 as the first American-born saint.", quote: "The accidents of life separate us from our dearest friends, but let us not despair. God is like a looking glass in which souls see each other.", quoteAttr: "Saint Elizabeth Ann Seton" }],
  "01-05": [{ name: "Saint John Neumann", titles: "Bishop of Philadelphia", era: "1811–1860", region: "Bohemia / Philadelphia", tags: ["Confessor"], bio: "Born in Prachatice, Bohemia, John Neumann emigrated to the United States in 1836 and became the fourth Bishop of Philadelphia. He organized the parochial school system, built nearly one hundred churches, and was the first bishop in the world to establish the Forty Hours Devotion diocesan-wide. He was canonized by Pope Paul VI in 1977 as the first American male saint.", quote: "So many people work for earthly, perishable things. I want to work only for the glory of God.", quoteAttr: "Saint John Neumann" }],
  "01-06": [{ name: "The Epiphany of the Lord", titles: "Solemnity", era: "1st century", region: "Bethlehem", tags: [], bio: "The Epiphany commemorates the visit of the Magi — wise men from the East — who followed a star to Bethlehem to adore the newborn King. Their arrival signifies the revelation of Christ to all nations. The Church traditionally names the Magi Caspar, Melchior, and Balthasar. In many countries this feast, not December 25, is the primary Christmas celebration.", quote: "We saw his star at its rising and have come to do him homage.", quoteAttr: "Matthew 2:2" }],
  "01-07": [{ name: "Saint Raymond of Penyafort", titles: "Priest, Canon Lawyer", era: "1175–1275", region: "Catalonia, Spain", tags: ["Confessor"], bio: "Raymond entered the Dominican Order at nearly fifty years of age, having already distinguished himself as a canon lawyer and teacher at Bologna. He compiled the Decretals — the official collection of papal law — at the request of Pope Gregory IX, a work that governed canon law for centuries. He also helped found the Order of Our Lady of Mercy for the ransom of Christian captives from the Moors.", quote: "My son, whenever you have an important matter to decide, bring it to God in prayer.", quoteAttr: "Saint Raymond of Penyafort" }],
  "01-08": [{ name: "Saint Apollinaris the Apologist", titles: "Bishop of Hierapolis", era: "2nd century", region: "Asia Minor", tags: ["Confessor"], bio: "Claudius Apollinaris was the bishop of Hierapolis in Phrygia during the reign of Emperor Marcus Aurelius. He composed a famous Apology defending Christianity to the Emperor and wrote extensively against the Montanist heresy. Though his writings survive only in fragments, his reputation was such that Eusebius of Caesarea praised him at length in the Ecclesiastical History.", quote: "The truth of the faith needs no embellishment; it shines by its own light.", quoteAttr: "Attributed to Saint Apollinaris the Apologist" }],
  "01-09": [{ name: "Saint Adrian of Canterbury", titles: "Abbot", era: "d. 710", region: "North Africa / England", tags: ["Confessor"], bio: "An African by birth and a scholar by formation, Adrian became abbot of a monastery near Naples before being sent to England as companion to Archbishop Theodore of Tarsus. Together they transformed the school at Canterbury into one of the finest centers of learning in Western Europe, teaching Latin, Greek, Scripture, theology, and the arts. His school produced the generation of scholars who shaped early English Christianity.", quote: "Let the school be a place where Christ is known through learning, and learning illumined by Christ.", quoteAttr: "Attributed to Saint Adrian of Canterbury" }],
  "01-10": [{ name: "Saint Gregory of Nyssa", titles: "Bishop and Doctor of the Church", era: "c. 335–395", region: "Cappadocia", tags: ["Doctor of the Church"], bio: "Younger brother of Saint Basil the Great, Gregory of Nyssa was one of the great speculative theologians of the early Church and a key figure at the First Council of Constantinople in 381. His Life of Moses is a masterpiece of Christian mysticism. He argued that the soul’s journey into God is infinite — an endless ascent called epektasis — a concept that deeply influenced Eastern Christian spirituality.", quote: "The goal of the virtuous life is to become like God.", quoteAttr: "Saint Gregory of Nyssa" }],
  "01-11": [{ name: "Saint Hyginus", titles: "Pope and Martyr", era: "d. c. 142", region: "Rome", tags: ["Martyr"], bio: "Hyginus was the ninth Bishop of Rome, serving during the reign of Emperor Antoninus Pius. He is venerated as a martyr in the Roman Martyrology, though the exact circumstances of his death are uncertain. During his pontificate he dealt with the Gnostic teachers Valentinus and Cerdo who had come to Rome. He is credited with organizing the Roman clergy into their hierarchical grades.", quote: "He governed the Church with wisdom and died for the faith.", quoteAttr: "Roman Martyrology" }],
  "01-12": [{ name: "Saint Marguerite Bourgeoys", titles: "Virgin, Founder of the Congregation of Notre Dame of Montreal", era: "1620–1700", region: "France / New France", tags: ["Confessor"], bio: "Born in Troyes, France, Marguerite Bourgeoys sailed to the colony of Ville-Marie — the future Montreal — in 1653. She opened the first school there in a stone stable and founded the Congregation of Notre Dame, an uncloistered religious community dedicated to education — a novel concept at the time. She was canonized by Pope John Paul II in 1982.", quote: "We must go where God calls us, without looking back.", quoteAttr: "Saint Marguerite Bourgeoys" }],
  "01-13": [{ name: "Saint Hilary of Poitiers", titles: "Bishop and Doctor of the Church", era: "c. 310–367", region: "Poitiers, Gaul", tags: ["Doctor of the Church"], bio: "Called the Athanasius of the West, Hilary was a converted pagan who became bishop of Poitiers and the foremost Latin defender of Nicene orthodoxy against Arianism. Exiled to Asia Minor by the Arian Emperor Constantius II, he used the time to study Eastern theology and write his great work On the Trinity. He returned to Gaul after four years having done more damage to Arianism in the East than most bishops who stayed home.", quote: "God is not something we can understand by search; he is recognized by faith.", quoteAttr: "Saint Hilary of Poitiers, On the Trinity" }],
  "01-14": [{ name: "Saint Kentigern", titles: "Bishop, Apostle of Scotland, Patron of Glasgow", era: "c. 518–603", region: "Scotland", tags: ["Confessor"], bio: "Also known as Saint Mungo — dear friend — Kentigern is the patron saint and founder of Glasgow. He was the first bishop of Strathclyde and evangelized what is now southern Scotland and northern England. The city of Glasgow’s coat of arms features four symbols from miracles attributed to him: a tree, a bird, a bell, and a fish with a ring in its mouth.", quote: "Lord, let Glasgow flourish by the preaching of thy word and praising thy name.", quoteAttr: "Traditional motto of Glasgow, attributed to Saint Kentigern" }],
  "01-15": [{ name: "Saint Paul the First Hermit", titles: "Father of Hermits", era: "c. 227–341", region: "Egypt", tags: ["Confessor"], bio: "According to Saint Jerome, who wrote his life, Paul fled into the Thebaid desert during the Decian persecution at age fifteen and lived for ninety years in a cave, fed daily by a raven. When Saint Anthony sought him out in his extreme old age, the raven brought a double portion of bread. Paul died in Anthony’s arms. He is the prototype of Christian eremitical life.", quote: "Behold the man whom the world was not worthy of.", quoteAttr: "Saint Jerome, Life of Paul the First Hermit" }],
  "01-16": [{ name: "Saint Marcellus I", titles: "Pope and Martyr", era: "d. 309", region: "Rome", tags: ["Martyr"], bio: "Marcellus served as Bishop of Rome during the turbulent aftermath of the Diocletianic persecution, a period of severe internal tension over how to treat those who had lapsed. His pontificate lasted less than two years; he worked to reorganize the Roman Church and restore discipline. He is venerated as a martyr in the Roman Martyrology.", quote: "He served the Church in a time of great testing.", quoteAttr: "Roman Martyrology" }],
  "01-17": [{ name: "Saint Anthony of Egypt", titles: "Father of Monasticism, Desert Father", era: "251–356", region: "Egypt", tags: ["Confessor"], bio: "Born into a wealthy Egyptian family, Anthony heard the Gospel command to sell all and give to the poor and obeyed literally. He retreated into the desert, spending decades in asceticism and battling demons. His life, written by Saint Athanasius, became the founding text of Christian monasticism and influenced the conversions of Saints Augustine and Jerome.", quote: "Whoever you may be, always have God before your eyes.", quoteAttr: "Saint Anthony of Egypt" }],
  "01-18": [{ name: "The Chair of Saint Peter at Rome", titles: "Ancient Feast", era: "1st century", region: "Rome", tags: [], bio: "This ancient feast commemorates Saint Peter’s establishment of his episcopal see in Rome. The cathedra — the bishop’s chair — symbolizes teaching authority. The feast was kept in Rome from at least the 4th century and celebrates the foundation of the Roman Church by the Prince of the Apostles.", quote: "You are Peter, and upon this rock I will build my Church.", quoteAttr: "Matthew 16:18" }],
  "01-19": [{ name: "Saint Wulfstan", titles: "Bishop of Worcester", era: "c. 1008–1095", region: "England", tags: ["Confessor"], bio: "Wulfstan was the last surviving Anglo-Saxon bishop after the Norman Conquest, the only pre-Conquest bishop to retain his see. He successfully argued before William the Conqueror that he held his staff from Saint Peter, not from the king. He was celebrated for his holiness, his care for the poor, and his successful campaign to end the Bristol slave trade.", quote: "We are wretched men who could not prevent the loss of our land; we can only watch it pass to a foreign nation.", quoteAttr: "Saint Wulfstan of Worcester" }],
  "01-20": [{ name: "Saint Fabian", titles: "Pope and Martyr", era: "d. 250", region: "Rome", tags: ["Martyr"], bio: "Fabian was elected pope in 236 in remarkable circumstances: according to Eusebius, a dove descended and settled on his head during the election, and the assembly took it as a divine sign. He organized the Roman Church into seven regions and sent missionary bishops to Gaul. He was the first victim of the Decian persecution, dying in prison in January 250. Saint Cyprian wrote that his death was worthy of his pure and righteous administration.", quote: "His death was worthy of his life.", quoteAttr: "Saint Cyprian of Carthage, on Saint Fabian" }],
  "01-21": [{ name: "Saint Agnes of Rome", titles: "Virgin and Martyr", era: "c. 291–304", region: "Rome", tags: ["Martyr"], bio: "Agnes was a young Roman girl of noble family, barely thirteen years old, who refused marriage to the son of a Roman prefect because she had consecrated her virginity to Christ. She was dragged before the authorities, threatened, and ultimately beheaded. Her feast was kept in Rome within living memory of her death, and her name has been in the Roman Canon since antiquity. On her feast day the lambs whose wool becomes the palliums of archbishops are blessed at the church of Sant’Agnese.", quote: "Christ made my soul beautiful with the jewels of grace and virtue. I belong to him whom the angels serve.", quoteAttr: "Acts of Saint Agnes" }],
  "01-22": [{ name: "Saint Vincent of Saragossa", titles: "Deacon and Martyr, Protomartyr of Spain", era: "d. 304", region: "Spain", tags: ["Martyr"], bio: "Vincent was a deacon of Bishop Valerius of Saragossa in Spain. During the Diocletianic persecution, while his bishop was exiled, Vincent was tortured with extraordinary cruelty by the governor Dacian and died of his wounds. His cult spread rapidly across the Western Church; Saint Augustine preached several sermons in his honor. He is venerated as the protomartyr of Spain.", quote: "These torments give me great joy, for the more the body is destroyed, the more the soul is renewed.", quoteAttr: "Acts of Saint Vincent" }],
  "01-23": [{ name: "Saint Marianne Cope", titles: "Virgin, Servant of the Lepers of Molokai", era: "1838–1918", region: "Germany / Hawaii", tags: ["Confessor"], bio: "Born Barbara Koob in Germany, Mother Marianne Cope led a group of Franciscan Sisters to Hawaii in 1883 to care for leprosy patients at a time when no one else would. She worked alongside Saint Damien of Molokai and, after his death from leprosy, continued his work for thirty more years without contracting the disease herself. She was canonized by Pope Benedict XVI in 2012.", quote: "I am not afraid of any disease, hence it will be my greatest happiness to serve the abandoned people.", quoteAttr: "Saint Marianne Cope" }],
  "01-24": [{ name: "Saint Francis de Sales", titles: "Bishop of Geneva, Doctor of the Church", era: "1567–1622", region: "Savoy, France", tags: ["Doctor of the Church"], bio: "A nobleman who became a bishop, Francis de Sales is the apostle of gentleness. Assigned to reconvert the Calvinist Chablais region, he distributed leaflets through closed doors and won thousands back to the Church through patience. His Introduction to the Devout Life teaches that holiness is accessible to every Christian in ordinary life. He co-founded the Visitation Order with Saint Jane de Chantal.", quote: "Be who you are and be that well.", quoteAttr: "Saint Francis de Sales" }],
  "01-25": [{ name: "The Conversion of Saint Paul", titles: "Feast", era: "c. 5–67", region: "Damascus Road", tags: [], bio: "Today the Church marks the dramatic conversion of Saul of Tarsus on the road to Damascus, where a blinding light and the voice of the Risen Christ transformed the most zealous persecutor of Christians into the greatest missionary the Church has ever known. He wrote nearly half of the New Testament, planted churches across the Mediterranean, and died for the faith he once sought to destroy.", quote: "I have been crucified with Christ; it is no longer I who live, but Christ who lives in me.", quoteAttr: "Galatians 2:20" }],
  "01-26": [{ name: "Saints Timothy and Titus", titles: "Bishops, Disciples of Saint Paul", era: "1st century", region: "Asia Minor / Crete", tags: ["Martyr"], bio: "Timothy and Titus were Paul’s closest collaborators and the recipients of his three Pastoral Epistles. Timothy, half-Jewish and half-Greek, became bishop of Ephesus. Titus, a Gentile, was Paul’s representative to Corinth and became bishop of Crete. The letters addressed to them remain the Church’s primary guide for pastoral governance.", quote: "Proclaim the word; be persistent whether it is convenient or inconvenient.", quoteAttr: "2 Timothy 4:2" }],
  "01-27": [{ name: "Saint Angela Merici", titles: "Virgin, Founder of the Ursulines", era: "1474–1540", region: "Brescia, Italy", tags: ["Confessor"], bio: "Angela Merici founded the Company of Saint Ursula in 1535 — the first teaching order of women in the Church. Unlike existing convents, her company lived in the world without habit or cloister, serving the poor and teaching children. The Ursulines became the most important teaching order for women in Catholic history, establishing schools across Europe and the Americas.", quote: "The world is out of order because there is disorder in the family.", quoteAttr: "Saint Angela Merici" }],
  "01-28": [{ name: "Saint Thomas Aquinas", titles: "Priest and Doctor of the Church, Angelic Doctor", era: "1225–1274", region: "Italy", tags: ["Doctor of the Church"], bio: "The greatest theologian in Catholic history, Thomas Aquinas synthesized Aristotelian philosophy with Christian revelation in the Summa Theologiae, a work still unsurpassed in scope and precision. His family kidnapped him to prevent him from joining the Dominicans; he remained in captivity for a year before escaping. Near the end of his life, after a mystical experience, he said of all his writings: It all seems like straw to me now.", quote: "To one who has faith, no explanation is necessary. To one without faith, no explanation is possible.", quoteAttr: "Saint Thomas Aquinas" }],
  "01-29": [{ name: "Saint Gildas the Wise", titles: "Monk and Historian", era: "c. 500–570", region: "Britain / Brittany", tags: ["Confessor"], bio: "Gildas was a British monk whose work De Excidio et Conquestu Britanniae — On the Ruin and Conquest of Britain — is the only contemporary British account of the period following the Roman withdrawal and the arrival of the Anglo-Saxons. He scathingly rebuked the British kings and clergy of his day for their corruption and later settled in Brittany.", quote: "Britain has kings, but they are tyrants. She has priests, but they are fools.", quoteAttr: "Saint Gildas, De Excidio" }],
  "01-30": [{ name: "Saint Bathildis", titles: "Queen of the Franks", era: "c. 626–680", region: "England / France", tags: ["Confessor"], bio: "Bathildis was an Anglo-Saxon slave girl who became queen of the Franks through her marriage to King Clovis II. After his death she served as regent and used her power to suppress the slave trade, redeem captives, found monasteries including Corbie and Chelles, and endow the poor. When her regency ended she retired to Chelles as a simple nun, submitting to the abbess as though she had never been a queen.", quote: "She who was once a slave used her freedom to free others.", quoteAttr: "Life of Saint Bathildis" }],
  "01-31": [{ name: "Saint John Bosco", titles: "Priest, Founder of the Salesians", era: "1815–1888", region: "Turin, Italy", tags: ["Confessor"], bio: "Don Bosco grew up in peasant poverty in Piedmont and devoted his priestly life to the abandoned and delinquent boys of industrializing Turin. His preventive system of education — based on reason, religion, and loving-kindness rather than punishment — transformed thousands of street children. He founded the Salesians of Don Bosco and, with Saint Mary Mazzarello, the Salesian Sisters. He was canonized in 1934.", quote: "It is not enough to love children. They must know that they are loved.", quoteAttr: "Saint John Bosco" }],
  "02-01": [{ name: "Saint Brigid of Ireland", titles: "Virgin, Abbess of Kildare, Patroness of Ireland", era: "c. 451–525", region: "Ireland", tags: ["Confessor"], bio: "One of the three patron saints of Ireland alongside Patrick and Columba, Brigid founded the great monastery of Kildare which became a center of learning and art. The Book of Kildare, now lost, was praised as the most beautiful illuminated manuscript in the world. She is celebrated for her extraordinary generosity to the poor and her miraculous gifts of healing.", quote: "I would like a great lake of ale for the King of Kings. I would like the angels of Heaven to be drinking it through time eternal.", quoteAttr: "Saint Brigid of Ireland, traditional poem" }],
  "02-02": [{ name: "The Presentation of the Lord", titles: "Feast — Candlemas", era: "1st century", region: "Jerusalem", tags: [], bio: "Forty days after Christmas the Church commemorates Mary and Joseph bringing the infant Jesus to the Temple in fulfillment of Mosaic law. There the aged Simeon took the child in his arms and proclaimed him a light for revelation to the Gentiles. This feast, called Candlemas, marks the midpoint between the winter solstice and the spring equinox. Candles are blessed to symbolize Christ as the Light of the World.", quote: "Now, Master, you may let your servant go in peace, for my eyes have seen your salvation.", quoteAttr: "Luke 2:29–30 (Nunc Dimittis)" }],
  "02-03": [{ name: "Saint Blaise", titles: "Bishop of Sebaste, Martyr", era: "d. c. 316", region: "Armenia", tags: ["Martyr"], bio: "Blaise was bishop of Sebaste in Armenia, martyred under Emperor Licinius. Tradition holds he healed a boy choking on a fishbone while imprisoned, giving rise to the centuries-old blessing of throats on his feast day with crossed candles. He is one of the Fourteen Holy Helpers, beloved patron against throat diseases. The throat blessing remains among the most popular sacramentals in the Church.", quote: "Through the intercession of Saint Blaise, bishop and martyr, may God deliver you from ailments of the throat and from every other evil.", quoteAttr: "Roman Ritual, Blessing of Throats" }],
  "02-04": [{ name: "Saint John de Britto", titles: "Priest and Martyr, Apostle of India", era: "1647–1693", region: "Portugal / India", tags: ["Martyr"], bio: "A Portuguese Jesuit of noble family who could have had a comfortable life at court, John de Britto chose instead to evangelize India. He adopted Indian dress and customs to preach among the lower castes, was tortured and expelled, returned, and was finally beheaded in the Tamil Nadu region of southern India. He was canonized by Pope Pius XII in 1947.", quote: "I have found my treasure. Now I wish for nothing else.", quoteAttr: "Saint John de Britto" }],
  "02-05": [{ name: "Saint Agatha", titles: "Virgin and Martyr", era: "d. c. 251", region: "Sicily", tags: ["Martyr"], bio: "Agatha was a young Sicilian noblewoman who consecrated her virginity to Christ. The Roman magistrate Quintianus tortured her cruelly for refusing his advances and had her breasts cut off; tradition holds that Saint Peter appeared to her in prison and healed her. She died of her wounds and was immediately venerated. Her name is in the Roman Canon and her veil is said to have stopped the eruption of Mount Etna.", quote: "My mind is established and grounded upon a firm rock.", quoteAttr: "Acts of Saint Agatha" }],
  "02-06": [{ name: "Saint Paul Miki and Companions", titles: "Martyrs of Japan", era: "d. 1597", region: "Nagasaki, Japan", tags: ["Martyr"], bio: "Paul Miki was a Japanese Jesuit scholastic, among twenty-six Catholics — Franciscans, Jesuits, and their Japanese converts — crucified on a hill outside Nagasaki by order of Toyotomi Hideyoshi. From his cross Paul Miki preached his final sermon, forgiving his executioners and proclaiming his faith. They are the first canonized martyrs of the Far East, canonized by Pope Pius IX in 1862.", quote: "The only reason for my death is that I have taught the doctrine of Christ.", quoteAttr: "Saint Paul Miki, from his cross" }],
  "02-07": [{ name: "Saint Colette", titles: "Virgin, Reformer of the Poor Clares", era: "1381–1447", region: "Picardy, France / Flanders", tags: ["Confessor"], bio: "Colette de Corbie was a carpenter’s daughter who became a Franciscan tertiary and then reformed the Poor Clares, returning them to the original strict observance of Saint Clare. Granted papal authority, she founded seventeen convents of Colettine Poor Clares. She was noted for her gift of prophecy and her work reconciling warring factions during the Hundred Years War. She was canonized in 1807.", quote: "We must do violence to ourselves, give up our own will, deny ourselves in everything.", quoteAttr: "Saint Colette" }],
  "02-08": [{ name: "Saint Josephine Bakhita", titles: "Virgin, Patron of Sudan", era: "c. 1869–1947", region: "Sudan / Italy", tags: ["Confessor"], bio: "Kidnapped into slavery in Sudan at around age eight, Josephine Bakhita endured years of brutal captivity before being sold to an Italian consul. In Italy she encountered the Canossian Sisters and was baptized in 1890, taking the name Josephine. She became a Canossian Sister and spent the rest of her life in Schio, Italy, radiating joy and gentleness. She was canonized by Pope John Paul II in 2000.", quote: "If I could meet those slave raiders, I would thank them and kneel down to kiss their hands — because what they did led me to faith and to God.", quoteAttr: "Saint Josephine Bakhita" }],
  "02-09": [{ name: "Saint Miguel Febres Cordero", titles: "Brother, Teacher", era: "1854–1910", region: "Ecuador", tags: ["Confessor"], bio: "Born in Cuenca, Ecuador, with a physical disability that made walking difficult, Miguel Febres Cordero entered the De La Salle Brothers and became a revered teacher. His Ecuadorian grammar and language textbooks became standard throughout the country. He was the first Ecuadorian to be beatified and was canonized by Pope John Paul II in 1984 as the first Ecuadorian-born saint.", quote: "To teach is to pray.", quoteAttr: "Saint Miguel Febres Cordero" }],
  "02-10": [{ name: "Saint Scholastica", titles: "Virgin, Twin Sister of Saint Benedict", era: "c. 480–543", region: "Italy", tags: ["Confessor"], bio: "The twin sister of Saint Benedict, Scholastica founded a women’s community near Monte Cassino. According to Saint Gregory the Great, she and Benedict met once a year for spiritual conversation. On their last meeting she prayed that he would stay the night, and a sudden storm prevented his departure. Three days later, as Benedict watched, her soul rose to heaven in the form of a dove.", quote: "I asked a favor of you and you refused it. I asked it of God and he has granted it.", quoteAttr: "Saint Scholastica to Saint Benedict, from Gregory the Great’s Dialogues" }],
  "02-11": [{ name: "Our Lady of Lourdes", titles: "Memorial", era: "1858", region: "Lourdes, France", tags: [], bio: "On February 11, 1858, the Virgin Mary began appearing to fourteen-year-old Bernadette Soubirous in the grotto of Massabielle near Lourdes. Over eighteen apparitions she identified herself as the Immaculate Conception and asked for a chapel and processions. The spring at Lourdes has been the site of thousands of documented cures. This day is also the World Day of the Sick.", quote: "I am the Immaculate Conception.", quoteAttr: "Our Lady of Lourdes to Saint Bernadette, March 25, 1858" }],
  "02-12": [{ name: "Seven Founders of the Order of Servites", titles: "Blessed Founders", era: "13th century", region: "Florence, Italy", tags: ["Confessor"], bio: "Seven wealthy Florentine merchants withdrew from the city on the Feast of the Assumption in 1233, retired to Monte Senario, and founded the Order of Servants of Mary. They lived in poverty and contemplation, spreading devotion to Our Lady of Sorrows. All seven are venerated together; they were canonized by Pope Leo XIII in 1888.", quote: "We have left all things and followed you.", quoteAttr: "Matthew 19:27 — motto of the Seven Holy Founders" }],
  "02-13": [{ name: "Saint Catherine de Ricci", titles: "Virgin", era: "1522–1590", region: "Florence, Italy", tags: ["Confessor"], bio: "Catherine de Ricci entered the Dominican convent at Prato at thirteen and became prioress at thirty. For twelve years she experienced the stigmata every week from Thursday noon to Friday afternoon. She corresponded with Saints Philip Neri, Charles Borromeo, and Pope Pius V. She is reputed to have bilocated to Rome to converse with Philip Neri, attested by witnesses in both cities.", quote: "Suffering is to me as bread and wine — I would not know what to do without it.", quoteAttr: "Saint Catherine de Ricci" }],
  "02-14": [{ name: "Saints Cyril and Methodius", titles: "Apostles of the Slavs, Co-Patrons of Europe", era: "9th century", region: "Thessalonica / Moravia", tags: ["Confessor"], bio: "Brothers born in Thessalonica, Cyril and Methodius were sent as missionaries to the Slavic peoples of Moravia. Cyril devised the Glagolitic alphabet — ancestor of Cyrillic — to translate Scripture and liturgy into the vernacular Slavonic language. They championed worship in the language of the people, laying the foundations of Slavic literature and culture throughout Eastern Europe.", quote: "We know no other teaching than true faith, and to God alone we look.", quoteAttr: "Saint Cyril" }],
  "02-15": [{ name: "Saint Claude de la Colombière", titles: "Priest, Apostle of the Sacred Heart", era: "1641–1682", region: "France / England", tags: ["Confessor"], bio: "A French Jesuit, Claude de la Colombière became the spiritual director of Saint Margaret Mary Alacoque at Paray-le-Monial and was the first to give formal approval to her visions of the Sacred Heart. He was sent to England as chaplain to Mary of Modena, was imprisoned on a false accusation of treason, expelled, and returned to France in broken health. He was canonized in 1992.", quote: "I trust in your mercy as a child trusts in its mother.", quoteAttr: "Saint Claude de la Colombière" }],
  "02-16": [{ name: "Saint Onesimus", titles: "Martyr, Disciple of Saint Paul", era: "1st century", region: "Asia Minor", tags: ["Martyr"], bio: "Onesimus was the runaway slave on whose behalf Saint Paul wrote his shortest epistle — the Letter to Philemon — asking his master to receive him back not as a slave but as a dear brother. Tradition identifies him with the Onesimus whom Ignatius of Antioch praised as bishop of Ephesus in the early 2nd century. He is venerated as a martyr.", quote: "I am sending him, that is, my own heart, back to you.", quoteAttr: "Philemon 1:12, Saint Paul on Onesimus" }],
  "02-17": [{ name: "Seven Holy Founders of the Servites", titles: "Founders of the Order of Servants of Mary", era: "13th century", region: "Florence, Italy", tags: ["Confessor"], bio: "Blessed Bonfilius Monaldo, Alexis Falconieri, Benedict dell’Antella, Bartholomew Amidei, Ricoverus Uguccione, Gerardinus Sostegni, and John Buonagiunta — seven young noblemen of Florence who abandoned wealth to live in community and prayer on Monte Senario, founding the Order of the Servants of Mary in 1233. This feast is the principal commemoration in the Servite calendar.", quote: "Here we are, Lord; send us.", quoteAttr: "Traditional response of the Seven Founders" }],
  "02-18": [{ name: "Blessed Fra Angelico", titles: "Dominican Friar, Patron of Catholic Artists", era: "c. 1395–1455", region: "Florence, Italy", tags: ["Confessor"], bio: "Guido di Pietro entered the Dominican friars as Fra Giovanni da Fiesole and became the greatest religious painter of the early Renaissance. His frescoes in the convent of San Marco in Florence, painted for the monks’ meditation, combine theological depth with extraordinary luminosity. He reportedly wept whenever he painted the Crucifixion. Pope John Paul II beatified him in 1984 and declared him patron of Catholic artists.", quote: "He who does the work of Christ must always be with Christ.", quoteAttr: "Blessed Fra Angelico" }],
  "02-19": [{ name: "Saint Conrad of Piacenza", titles: "Penitent Hermit", era: "1290–1351", region: "Italy / Sicily", tags: ["Confessor"], bio: "Conrad of Piacenza was a wealthy Italian nobleman who accidentally started a fire while hunting and allowed an innocent peasant to be condemned for it. He confessed his guilt, gave away his fortune to pay damages, and embraced a life of penance as a Franciscan tertiary. He eventually settled as a hermit in Sicily where he was known for miracles and counseling pilgrims.", quote: "My greatest penance is to live with myself.", quoteAttr: "Attributed to Saint Conrad of Piacenza" }],
  "02-20": [{ name: "Saint Jacinta and Francisco Marto", titles: "Seers of Fátima", era: "1910–1920 / 1908–1919", region: "Fátima, Portugal", tags: ["Confessor"], bio: "Francisco and Jacinta Marto were siblings who, with their cousin Lucia dos Santos, witnessed the apparitions of Our Lady of Fátima in 1917. Both died young from the influenza pandemic Our Lady had foretold. They were canonized by Pope Francis in 2017 — the youngest non-martyred saints in Church history.", quote: "Our Lady wants more people to pray the Rosary.", quoteAttr: "Jacinta Marto" }],
  "02-21": [{ name: "Saint Peter Damian", titles: "Bishop and Doctor of the Church", era: "1007–1072", region: "Ravenna, Italy", tags: ["Doctor of the Church"], bio: "An orphan raised by a brother who worked him as a swineherd before another brother — a priest — educated him, Peter Damian became a hermit at Fonte Avellana and a tireless reformer of the Church. He attacked clerical corruption and simony with such force that he was made Cardinal-Bishop of Ostia against his will. He was a key figure in the Gregorian Reform.", quote: "The love of Christ drives us to act with zeal for his house.", quoteAttr: "Saint Peter Damian" }],
  "02-22": [{ name: "The Chair of Saint Peter", titles: "Feast", era: "1st century", region: "Rome", tags: [], bio: "This feast celebrates the authority Christ conferred upon Simon Peter: You are Peter, and upon this rock I will build my Church. The cathedra — the bishop’s chair — symbolizes teaching authority. To celebrate the Chair of Peter is to profess faith in the visible unity of the Church under the successor of the apostle who received the keys of the kingdom. The bronze chair of Bernini in Saint Peter’s Basilica encloses a relic of the ancient wooden cathedra.", quote: "You are Peter, and upon this rock I will build my Church, and the gates of the netherworld shall not prevail against it.", quoteAttr: "Matthew 16:18" }],
  "02-23": [{ name: "Saint Polycarp of Smyrna", titles: "Bishop and Martyr", era: "c. 69–155", region: "Smyrna, Asia Minor", tags: ["Martyr"], bio: "Polycarp was bishop of Smyrna and a disciple of Saint John the Apostle — one of the last living links to the eyewitnesses of Christ. At eighty-six years old he was arrested and brought to the arena. When ordered to deny Christ, he replied: Eighty-six years I have served him, and he has done me no wrong. He was burned alive. His martyrdom account is the earliest detailed record of Christian martyrdom.", quote: "Eighty-six years I have served him, and he has done me no wrong. How can I blaspheme my King and my Savior?", quoteAttr: "Saint Polycarp, Martyrdom of Polycarp" }],
  "02-24": [{ name: "Saint Matthias", titles: "Apostle (traditional calendar)", era: "1st century", region: "Judea", tags: ["Martyr"], bio: "Matthias was chosen by lot to replace Judas Iscariot — the only apostle chosen by his fellow disciples rather than directly by Christ. Acts records he had been among the disciples since John’s baptism and was a witness of the Resurrection. Tradition holds he preached in Judea and Ethiopia before dying as a martyr. His feast is May 14 in the reformed calendar.", quote: "The lot fell upon Matthias, and he was counted with the eleven apostles.", quoteAttr: "Acts 1:26" }],
  "02-25": [{ name: "Saint Walburga", titles: "Virgin and Abbess", era: "c. 710–779", region: "England / Germany", tags: ["Confessor"], bio: "Walburga was an English Benedictine nun who accompanied Saint Boniface to Germany as part of his missionary effort. She became abbess of the double monastery at Heidenheim in Bavaria. She was canonized on May 1, 870 — the pagan feast of Walpurgis Night takes its name from her feast’s eve. She is invoked against plague, famine, and witchcraft.", quote: "She carried the faith from her island to the continent, and her light did not go out.", quoteAttr: "Roman Martyrology" }],
  "02-26": [{ name: "Saint Porphyry of Gaza", titles: "Bishop", era: "347–420", region: "Palestine", tags: ["Confessor"], bio: "Porphyry was a wealthy Greek who gave away his fortune, became a monk in Egypt, and was eventually made bishop of Gaza in 395 — a city almost entirely pagan. After years of patient ministry he succeeded in having the great temple of Marnas destroyed by imperial decree. The Life of Porphyry, written by his deacon Mark, is a vivid account of the confrontation between Christianity and late antique paganism.", quote: "Pray for the pagans, for they do not know what they do.", quoteAttr: "Attributed to Saint Porphyry of Gaza" }],
  "02-27": [{ name: "Saint Gabriel of Our Lady of Sorrows", titles: "Religious", era: "1838–1862", region: "Italy", tags: ["Confessor"], bio: "Francis Possenti was a charming and sociable young man from a prominent Spoleto family who entered the Passionist novitiate at nineteen, taking the name Gabriel of Our Lady of Sorrows. He spent only five years as a religious before dying of tuberculosis at twenty-four, but his spiritual intensity and joy made such an impression that he was canonized in 1920. He is the patron saint of young people.", quote: "Perfection consists in doing the will of God, not in understanding it.", quoteAttr: "Saint Gabriel of Our Lady of Sorrows" }],
  "02-28": [{ name: "Blessed Daniel Brottier", titles: "Priest, Holy Spirit Father", era: "1876–1936", region: "France / Senegal", tags: ["Confessor"], bio: "A Holy Ghost Father, Daniel Brottier served as a missionary in Senegal, as a chaplain in the trenches of World War I, and spent the last fifteen years of his life caring for abandoned children at Auteuil near Paris. He built a chapel to Saint Thérèse of Lisieux there before her canonization. He was beatified by Pope John Paul II in 1984.", quote: "Love is not content with halves.", quoteAttr: "Blessed Daniel Brottier" }],
  "02-29": [{ name: "Saint Oswald of Worcester", titles: "Bishop and Archbishop of York", era: "d. 992", region: "England", tags: ["Confessor"], bio: "Oswald was a Benedictine monk who became Bishop of Worcester and later Archbishop of York, playing a key role in the 10th-century monastic reform of England alongside Saints Dunstan and Æthelwold. He died on February 29, 992, having just washed the feet of twelve poor men in memory of Christ’s act at the Last Supper. He appears only on leap years; on other years this date is celebrated with February 28.", quote: "In washing the feet of the poor, I wash the feet of my Lord.", quoteAttr: "Attributed to Saint Oswald of Worcester" }],
  "03-01": [{ name: "Saint David of Wales", titles: "Bishop, Patron of Wales", era: "c. 500–589", region: "Wales", tags: ["Confessor"], bio: "The patron saint of Wales, David founded the monastery at Mynyw (now Saint David’s) and presided over two synods that shaped the Welsh Church. He was renowned for his asceticism — his community drank only water and ate bread, herbs, and vegetables, earning them the name the Watermen. His last recorded words, spoken to his community on the Sunday before his death, are remembered on his feast day.", quote: "Be joyful, and keep your faith and your creed. Do the little things that you have seen me do and heard about.", quoteAttr: "Saint David of Wales, traditional last words" }],
  "03-02": [{ name: "Saint Blessed Charles the Good", titles: "Count of Flanders, Martyr", era: "1083–1127", region: "Flanders", tags: ["Martyr"], bio: "Charles was Count of Flanders, son of King Canute IV of Denmark (himself a martyr) and renowned for his justice and care of the poor. He distributed grain during a famine and suppressed a powerful family that had seized church properties. He was assassinated in the church of Saint Donatian in Bruges while kneeling at prayer. He is venerated as Blessed; his cause for canonization remains open.", quote: "He gave bread to the hungry and was killed in the act of prayer.", quoteAttr: "Roman Martyrology" }],
  "03-03": [{ name: "Saint Katharine Drexel", titles: "Virgin, Founder of the Sisters of the Blessed Sacrament", era: "1858–1955", region: "Philadelphia / Louisiana", tags: ["Confessor"], bio: "Heiress to a vast Philadelphia banking fortune, Katharine Drexel heard Pope Leo XIII challenge her personally: Why not become a missionary yourself? She founded the Sisters of the Blessed Sacrament in 1891, dedicated to Native Americans and African Americans, and spent twenty million dollars of her own inheritance building schools and missions. Xavier University of Louisiana, which she founded in 1925, is the only historically Black Catholic university in the United States.", quote: "The patient and humble endurance of the cross — whatever nature it may be — is the highest work we have to do.", quoteAttr: "Saint Katharine Drexel" }],
  "03-04": [{ name: "Saint Casimir", titles: "Prince of Poland, Patron of Poland and Lithuania", era: "1458–1484", region: "Poland / Lithuania", tags: ["Confessor"], bio: "The second son of King Casimir IV of Poland, Casimir refused his father’s command to lead an army into Hungary to seize a crown, choosing instead a life of prayer and penance. Despite being a royal prince he slept on the floor, fasted rigorously, and spent long hours before the Blessed Sacrament. He died of tuberculosis at twenty-six, still a layman. He was canonized in 1521.", quote: "He loved the poor and bore witness to the emptiness of earthly things.", quoteAttr: "Roman Martyrology" }],
  "03-05": [{ name: "Saint John Joseph of the Cross", titles: "Priest", era: "1654–1734", region: "Naples, Italy", tags: ["Confessor"], bio: "Carlo Gaetano Calosirto entered the Franciscan Alcantarines at sixteen and became the first Italian member of the order. He was known for extraordinary austerities, levitation during prayer, and bilocation. He spent his priestly life in Naples hearing confessions and caring for the poor and sick. He was canonized by Gregory XVI in 1839.", quote: "He who prays is certain to be saved; he who does not pray is certain to be lost.", quoteAttr: "Attributed to Saint John Joseph of the Cross" }],
  "03-06": [{ name: "Saint Colette of Corbie", titles: "Virgin, Reformer of the Poor Clares (Franciscan calendar)", era: "1381–1447", region: "France / Flanders", tags: ["Confessor"], bio: "Colette de Corbie reformed the Poor Clares from their lax observance back to the strict rule of Saint Clare, granted papal authority by the Avignon pope Benedict XIII. She founded seventeen convents of reform across France and Flanders. Her feast is celebrated on March 6 in the Franciscan calendar; February 7 in the General Roman Calendar.", quote: "Let us put on the armor of light and follow in the footsteps of our holy mother Clare.", quoteAttr: "Saint Colette" }],
  "03-07": [{ name: "Saints Perpetua and Felicity", titles: "Martyrs of Carthage", era: "d. 203", region: "Carthage, North Africa", tags: ["Martyr"], bio: "Vibia Perpetua was a twenty-two-year-old noblewoman and nursing mother; Felicity was her pregnant enslaved companion. Both were arrested in Carthage during the Severan persecution. Perpetua kept a prison diary — one of the earliest texts written by a Christian woman — recording her visions and steadfast faith. Felicity gave birth two days before the execution. Both were thrown to wild beasts on March 7, 203. Their names are in the Roman Canon of the Mass.", quote: "Stand fast in the faith, and love one another, all of you, and be not offended at my sufferings.", quoteAttr: "Saint Perpetua, final address to her companions" }],
  "03-08": [{ name: "Saint John of God", titles: "Founder of the Brothers Hospitallers", era: "1495–1550", region: "Portugal / Spain", tags: ["Confessor"], bio: "A Portuguese soldier who lived a dissolute life until his conversion at forty after hearing a sermon by Saint John of Ávila, John of God began collecting the sick and poor off the streets of Granada and founding what became the Order of the Brothers Hospitallers. He drowned attempting to save a drowning man and died at fifty-five. He is patron of the sick, hospitals, nurses, and the dying.", quote: "Labor without stopping. Eat little, live poorly, and place all your trust in God’s Providence.", quoteAttr: "Saint John of God" }],
  "03-09": [{ name: "Saint Frances of Rome", titles: "Matron, Foundress of the Oblates of Mary", era: "1384–1440", region: "Rome", tags: ["Confessor"], bio: "Frances Bussa was married at thirteen, raised a family through plague, famine, and civil war in Rome, and nursed the sick during epidemics. She is said to have had a guardian angel visible to her for twenty-three years. She founded the community of Oblates of Mary for laywomen and widows. After her husband’s death she joined their community as a simple member. She is patron of motorists.", quote: "A married woman must, when called upon, quit her devotions to God at the altar to find him in her household affairs.", quoteAttr: "Saint Frances of Rome" }],
  "03-10": [{ name: "Saint Dominic Savio", titles: "Youth", era: "1842–1857", region: "Piedmont, Italy", tags: ["Confessor"], bio: "A student of Don Bosco at the Oratory of Turin, Dominic Savio died of pleurisy at fourteen years and nine months — the youngest non-martyr canonized by the Church who was not a member of a religious order. Don Bosco wrote his biography, describing his extraordinary piety and his motto: Death rather than sin. He was canonized by Pope Pius XII in 1954.", quote: "Death rather than sin.", quoteAttr: "Saint Dominic Savio’s motto" }],
  "03-11": [{ name: "Saint Eulogius of Córdoba", titles: "Priest and Martyr", era: "d. 859", region: "Córdoba, Al-Andalus", tags: ["Martyr"], bio: "Eulogius was a priest in Moorish Córdoba who encouraged the voluntary martyrs of Córdoba — Christians who publicly proclaimed Christ before Muslim authorities knowing they would be executed. He wrote their history in his Memorial of the Saints. He was himself arrested after sheltering a Muslim convert and beheaded on March 11, 859. His friend Paulus Alvarus called him the consolation of the Church in Spain.", quote: "I rejoice in the testimony I am about to give for the name of Jesus Christ.", quoteAttr: "Attributed to Saint Eulogius of Córdoba" }],
  "03-12": [{ name: "Saint Gregory the Great", titles: "Pope and Doctor of the Church (traditional calendar)", era: "c. 540–604", region: "Rome", tags: ["Doctor of the Church"], bio: "The first monk to become pope, Gregory the Great reformed the liturgy — Gregorian chant bears his name — wrote the Pastoral Rule, fed the poor of Rome during famine, and sent Saint Augustine of Canterbury to evangelize England. He signed his letters servant of the servants of God, a title still used by popes today. His feast is September 3 in the reformed calendar.", quote: "It is not the place that sanctifies the man, but the man the place.", quoteAttr: "Saint Gregory the Great" }],
  "03-13": [{ name: "Saint Leander of Seville", titles: "Bishop", era: "c. 534–601", region: "Seville, Spain", tags: ["Confessor"], bio: "Elder brother of Saint Isidore of Seville, Leander was archbishop of Seville and was instrumental in converting the Visigoths from Arianism to Catholicism. He presided over the Third Council of Toledo in 589, at which King Reccared publicly renounced Arianism. He was a close friend of Pope Gregory the Great, who wrote his Moralia in Job at Leander’s request while both were in Constantinople.", quote: "The conversion of an entire nation to the true faith is worth every trial.", quoteAttr: "Attributed to Saint Leander of Seville" }],
  "03-14": [{ name: "Saint Mathildis", titles: "Queen of Germany", era: "c. 895–968", region: "Germany", tags: ["Confessor"], bio: "Mathildis (Matilda) was queen consort of Germany as wife of King Henry I the Fowler. After his death she distributed so much of her wealth to the poor and to monasteries that her son Otto I stripped her of her revenues. Restored to favor, she founded several monasteries and lived a deeply pious life. She died praying before the altar and is venerated in Germany as a model of royal holiness.", quote: "What good is a crown if you cannot also receive the one that never fades?", quoteAttr: "Attributed to Saint Mathildis" }],
  "03-15": [{ name: "Saint Louise de Marillac", titles: "Co-Founder of the Daughters of Charity", era: "1591–1660", region: "Paris, France", tags: ["Confessor"], bio: "Widowed with a grown son, Louise de Marillac came under the direction of Saint Vincent de Paul, who recognized in her the ideal partner for his mission to the poor. Together they founded the Daughters of Charity in 1633 — the first women’s congregation not bound to cloister, free to serve the poor in their homes and hospitals. She was canonized in 1934 and declared patron of social workers.", quote: "The poor are our masters, and we must obey them.", quoteAttr: "Saint Louise de Marillac" }],
  "03-16": [{ name: "Saint Heribert of Cologne", titles: "Archbishop of Cologne", era: "970–1021", region: "Germany", tags: ["Confessor"], bio: "Heribert served as chancellor to Emperor Otto III and then as Archbishop of Cologne under Henry II. He was known for his generosity to the poor and for a great procession he organized to pray for rain during a severe drought, which ended miraculously. He founded the Deutz Abbey near Cologne. He was canonized by Pope Gregory VII in 1074.", quote: "Let the poor man never leave my door without being helped.", quoteAttr: "Attributed to Saint Heribert of Cologne" }],
  "03-17": [{ name: "Saint Patrick", titles: "Bishop, Apostle of Ireland, Patron of Ireland", era: "c. 385–461", region: "Britain / Ireland", tags: ["Confessor"], bio: "Born in Roman Britain, Patrick was kidnapped at sixteen by Irish pirates and enslaved for six years, during which his faith deepened profoundly. He escaped, trained for the priesthood, and returned to the Ireland that had enslaved him to preach the Gospel. His Confession reveals a man of extraordinary humility, deep prayer, and unshakeable conviction that God had called him specifically to those people.", quote: "Christ with me, Christ before me, Christ behind me, Christ in me, Christ beneath me, Christ above me.", quoteAttr: "Saint Patrick’s Breastplate" }],
  "03-18": [{ name: "Saint Cyril of Jerusalem", titles: "Bishop and Doctor of the Church", era: "c. 313–386", region: "Jerusalem", tags: ["Doctor of the Church"], bio: "Cyril was bishop of Jerusalem for nearly forty years, though much of his episcopate was spent in exile by Arian emperors. His Catechetical Lectures, delivered to candidates for baptism at the Church of the Holy Sepulchre, are among the most valuable documents of early Christian liturgy and theology. He witnessed the rediscovery of the True Cross and wrote that fragments of it had already spread across the whole world.", quote: "The dragon sits by the side of the road, watching those who pass. Beware lest he devour you. We go to the Father of souls, but it is necessary to pass by the dragon.", quoteAttr: "Saint Cyril of Jerusalem" }],
  "03-19": [{ name: "Saint Joseph", titles: "Husband of Mary, Foster Father of Jesus, Patron of the Universal Church", era: "1st century", region: "Nazareth", tags: [], bio: "Carpenter, husband, and quiet guardian of the Holy Family, Joseph said yes without recorded words. He obeyed four angelic commands in dreams without question — to take Mary as his wife, flee to Egypt, return to Israel, and settle in Galilee. Pope Pius IX declared him Patron of the Universal Church in 1870. Pope Francis added his name to all four Eucharistic Prayers in 2013.", quote: "Joseph did as the angel of the Lord had commanded him.", quoteAttr: "Matthew 1:24" }],
  "03-20": [{ name: "Saint Cuthbert of Lindisfarne", titles: "Bishop and Confessor", era: "c. 634–687", region: "Northumbria, England", tags: ["Confessor"], bio: "Cuthbert was a shepherd boy who entered Melrose Abbey after seeing a vision of Saint Aidan’s soul carried to heaven. He became prior of Lindisfarne and then a hermit on the island of Inner Farne. His incorrupt body was later carried by monks across Northumbria for over a century to escape Viking raids, eventually coming to rest at Durham Cathedral.", quote: "Always keep peace and divine charity with yourselves and with others.", quoteAttr: "Saint Cuthbert’s dying words" }],
  "03-21": [{ name: "Saint Benedict of Nursia", titles: "Father of Western Monasticism (traditional calendar)", era: "c. 480–550", region: "Italy", tags: ["Confessor"], bio: "Benedict founded Monte Cassino around 529 and wrote the Rule that organized Western monasticism and preserved civilization. His Rule — remarkable for its humanity, balance, and spiritual depth — spread across Europe with his monks, who cleared forests, copied manuscripts, and evangelized whole peoples. Pope Paul VI declared him Co-Patron of Europe in 1964. His reformed calendar feast is July 11.", quote: "Prefer nothing whatever to Christ.", quoteAttr: "Rule of Saint Benedict, Chapter 72" }],
  "03-22": [{ name: "Saint Nicholas Owen", titles: "Martyr, Builder of Priest Holes", era: "d. 1606", region: "England", tags: ["Martyr"], bio: "Nicholas Owen was a Jesuit brother and master carpenter who spent years constructing hiding places — priest holes — in Catholic houses across England, enabling dozens of priests to evade capture during the Elizabethan and Jacobean persecutions. He was tortured on the rack to betray the locations of his hiding places and revealed nothing. He died under torture in the Tower of London and was canonized as one of the Forty Martyrs of England and Wales.", quote: "He never revealed the location of a single priest hole, nor the name of a single priest.", quoteAttr: "Jesuit annual letter, 1606" }],
  "03-23": [{ name: "Saint Turibius of Mogrovejo", titles: "Archbishop of Lima", era: "1538–1606", region: "Spain / Peru", tags: ["Confessor"], bio: "A Spanish layman and lawyer appointed Archbishop of Lima by Philip II, Turibius crossed the Andes on foot to visit every corner of his vast diocese three times over twenty-five years of ministry. He defended the indigenous peoples against colonial exploitation, ordained Saints Rose of Lima and Martin de Porres, and convened councils that shaped the Church in Latin America.", quote: "Christ said: I am the truth. He did not say: I am tradition.", quoteAttr: "Saint Turibius of Mogrovejo" }],
  "03-24": [{ name: "Saint Oscar Romero", titles: "Archbishop of San Salvador, Martyr", era: "1917–1980", region: "El Salvador", tags: ["Martyr"], bio: "Oscar Romero was Archbishop of San Salvador, initially considered a safe conservative appointment. The murder of his friend Father Rutilio Grande transformed him. He became the voice of the poor and the murdered during El Salvador’s civil war, broadcasting his homilies on the radio. He was shot at the altar while celebrating Mass on March 24, 1980. He was canonized by Pope Francis in 2018.", quote: "If they kill me, I shall arise in the Salvadoran people.", quoteAttr: "Saint Oscar Romero" }],
  "03-25": [{ name: "The Annunciation of the Lord", titles: "Solemnity", era: "1st century", region: "Nazareth", tags: [], bio: "Nine months before Christmas, the Church commemorates the moment the Angel Gabriel appeared to Mary in Nazareth and announced that she would conceive the Son of God. Her fiat — Let it be done to me according to your word — is the hinge of salvation history. The Incarnation was accomplished at that moment. The entire Roman Rite genuflects at the words and was incarnate in the Creed on this day.", quote: "Behold, I am the handmaid of the Lord. May it be done to me according to your word.", quoteAttr: "Luke 1:38" }],
  "03-26": [{ name: "Saint Ludger", titles: "Bishop, Apostle of Saxony", era: "c. 742–809", region: "Frisia / Saxony", tags: ["Confessor"], bio: "A Frisian student of Saint Gregory of Utrecht and later of Alcuin at York, Ludger evangelized Frisia and Saxony, founding the monastery at Werden. He was consecrated bishop of Münster around 805 and is considered the first bishop and apostle of Westphalia. He was noted for his gentleness with converts and his care for the poor.", quote: "Preach always; use words when necessary.", quoteAttr: "Attributed to Saint Ludger" }],
  "03-27": [{ name: "Saint John of Egypt", titles: "Hermit and Prophet", era: "c. 304–394", region: "Egypt", tags: ["Confessor"], bio: "John of Lycopolis spent his life as a hermit walled into a cave on Mount Lycos, accessible only through a small window. He was reputed to have the gift of prophecy; Emperor Theodosius I consulted him before two major military campaigns and received accurate predictions of victory. Saint Augustine, Palladius, and Rufinus all wrote about him. He died in prayer at ninety.", quote: "Humility is the foundation of all the virtues.", quoteAttr: "Saint John of Egypt, from the Historia Lausiaca" }],
  "03-28": [{ name: "Saint Gontran", titles: "King of Burgundy", era: "c. 532–592", region: "Burgundy", tags: ["Confessor"], bio: "Gontran (Guntram) was King of Burgundy from 561 to 592, noted for his extraordinary piety among the often violent Frankish kings of his era. He was renowned for his charity to the poor, his building of churches, and his deep concern for Church discipline. Gregory of Tours praised him lavishly as a model Christian king. He was canonized by local tradition.", quote: "A king must answer for his people before God.", quoteAttr: "Attributed to Saint Gontran" }],
  "03-29": [{ name: "Blessed Rupert Mayer", titles: "Jesuit Priest", era: "1876–1945", region: "Germany", tags: ["Confessor"], bio: "A German Jesuit chaplain who lost a leg in World War I, Rupert Mayer became one of the most beloved preachers in Munich. He was one of the first Catholic clergy to publicly denounce National Socialism and was repeatedly imprisoned by the Gestapo. He died in 1945 from the effects of his imprisonment, six months before the war ended. He was beatified by Pope John Paul II in 1987.", quote: "I must obey God rather than men.", quoteAttr: "Blessed Rupert Mayer" }],
  "03-30": [{ name: "Saint Peter Regalado", titles: "Priest, Franciscan Reformer", era: "1390–1456", region: "Valladolid, Spain", tags: ["Confessor"], bio: "Peter Regalado entered the Franciscans at thirteen and devoted himself to reforming the order along stricter lines, founding several hermitages in Castile. He was noted for his extreme poverty and the gift of bilocation — he was reportedly seen simultaneously in two of his hermitages. He was canonized in 1746 and is one of the patron saints of Valladolid.", quote: "To possess nothing and to give everything is the perfect imitation of Christ.", quoteAttr: "Attributed to Saint Peter Regalado" }],
  "03-31": [{ name: "Saint Benjamin", titles: "Deacon and Martyr", era: "d. c. 421", region: "Persia", tags: ["Martyr"], bio: "Benjamin was a deacon of the Persian Church who was imprisoned under Yazdegerd I and Bahram V for preaching the Gospel. He was released on condition that he cease preaching, but he refused to comply, saying he could not conceal the light of the Gospel. He was tortured and killed. He is venerated in both East and West.", quote: "I cannot hide the light that God has commanded me to shine.", quoteAttr: "Attributed to Saint Benjamin the Deacon" }],
  "04-01": [{ name: "Saint Hugh of Grenoble", titles: "Bishop", era: "1053\u20131132", region: "Grenoble, France", tags: ["Confessor"], bio: "Hugh was a reluctant bishop who tried to resign three times yet served the diocese of Grenoble for fifty-two years with exceptional holiness. He welcomed Saint Bruno and his companions to the Chartreuse valley in 1084, giving them the land on which they built the Grande Chartreuse and founded the Carthusian order. He was canonized only two years after his death.", quote: "I am not worthy to shepherd others, for I can scarcely govern myself.", quoteAttr: "Attributed to Saint Hugh of Grenoble" }],
  "04-02": [{ name: "Saint Francis of Paola", titles: "Hermit, Founder of the Minims", era: "1416\u20131507", region: "Calabria, Italy", tags: ["Confessor"], bio: "Francis of Paola founded the Order of Minims \u2014 the least of all religious, a deliberate act of evangelical humility. His miracles of healing and prophecy made him famous across Europe. Louis XI of France summoned him to comfort him on his deathbed. He lived to ninety-one and died on Good Friday. He was canonized in 1519.", quote: "Confidence in God, confidence in God, confidence in God.", quoteAttr: "Saint Francis of Paola, dying words" }],
  "04-03": [{ name: "Saint Richard of Chichester", titles: "Bishop", era: "1197\u20131253", region: "England", tags: ["Confessor"], bio: "Richard of Wyche became Bishop of Chichester but King Henry III refused to recognize his appointment and stripped his clergy of revenues, forcing Richard to walk the diocese on foot for two years. His famous prayer of thanksgiving became the basis of the musical Day by Day from the show Godspell. He was canonized by Pope Urban IV in 1262.", quote: "Thanks be to thee, my Lord Jesus Christ, for all the benefits thou hast given me, for all the pains and insults thou hast borne for me.", quoteAttr: "Saint Richard of Chichester" }],
  "04-04": [{ name: "Saint Isidore of Seville", titles: "Bishop and Doctor of the Church", era: "c. 560\u2013636", region: "Seville, Spain", tags: ["Doctor of the Church"], bio: "The last of the Latin Church Fathers, Isidore compiled the Etymologiae \u2014 a twenty-volume encyclopedia of all human knowledge \u2014 which served as the primary reference work in Western Europe for centuries. As Archbishop of Seville he presided over the Fourth Council of Toledo in 633. Pope John Paul II proposed him as patron of the Internet in 1997.", quote: "Prayer purifies us, reading instructs us. Both are good when both are possible.", quoteAttr: "Saint Isidore of Seville" }],
  "04-05": [{ name: "Saint Vincent Ferrer", titles: "Priest, Dominican Preacher", era: "1350\u20131419", region: "Valencia, Spain / Europe", tags: ["Confessor"], bio: "A Spanish Dominican who preached throughout Western Europe for over twenty years, Vincent Ferrer is said to have converted hundreds of thousands. He preached in Valencian and was reportedly understood by people of many languages. He played a key role in healing the Western Schism and was canonized in 1455.", quote: "Fear the Lord, give him glory, for the hour of his judgment has come.", quoteAttr: "Saint Vincent Ferrer, citing Revelation 14:7" }],
  "04-06": [{ name: "Saint Notker Balbulus", titles: "Monk and Musician", era: "c. 840\u2013912", region: "Saint Gall, Switzerland", tags: ["Confessor"], bio: "Notker Balbulus \u2014 the Stammerer \u2014 was a monk of the great Swiss abbey of Saint Gall who created the liturgical sequence, adding words to the long melodies sung after the Alleluia. His Liber Hymnorum established the musical form that influenced the entire subsequent history of Western liturgical music.", quote: "Out of great suffering comes great art, offered back to God.", quoteAttr: "Attributed to Saint Notker Balbulus" }],
  "04-07": [{ name: "Saint John Baptist de la Salle", titles: "Priest, Founder of the Brothers of the Christian Schools", era: "1651\u20131719", region: "Reims, France", tags: ["Confessor"], bio: "Born into French nobility, John Baptist de la Salle gave away his fortune to feed the poor and dedicated his life to the education of poor boys. He founded the Brothers of the Christian Schools, pioneered teacher training, and insisted on teaching in French rather than Latin so that ordinary children could truly learn. He is the patron saint of teachers and was canonized in 1900.", quote: "Remember that it is Jesus Christ you are educating in the person of the poor child.", quoteAttr: "Saint John Baptist de la Salle" }],
  "04-08": [{ name: "Saint Julie Billiart", titles: "Virgin, Founder of the Sisters of Notre Dame de Namur", era: "1751\u20131816", region: "France / Belgium", tags: ["Confessor"], bio: "Julie Billiart suffered from a paralytic illness for twenty-two years, during which she continued her apostolate to the poor from her bed. She was miraculously cured in 1804 and immediately founded the Sisters of Notre Dame de Namur to educate poor girls. Despite repeated ecclesiastical conflicts she founded fifteen schools. She was canonized in 1969.", quote: "How good is the good God!", quoteAttr: "Saint Julie Billiart, her characteristic exclamation" }],
  "04-09": [{ name: "Saint Waldetrudis", titles: "Abbess", era: "d. c. 688", region: "Mons, Belgium", tags: ["Confessor"], bio: "Waldetrudis (Waudru) was a Frankish noblewoman whose entire family became saints: her husband Vincent Madelgaire, her sister Aldegonde, and her four children. After her husband entered religious life she founded the convent of Castrilocus, which later became the collegiate church of Sainte-Waudru in Mons, Belgium.", quote: "In a holy family, holiness is not an accident.", quoteAttr: "Attributed to Saint Waldetrudis" }],
  "04-10": [{ name: "Saint Michael de Sanctis", titles: "Religious", era: "1591\u20131625", region: "Catalonia, Spain", tags: ["Confessor"], bio: "Michael de Sanctis entered the Trinitarians at twelve, transferred to the reformed Discalced Trinitarians, and was known for his extraordinary devotion to the Eucharist. He reportedly went into ecstasy at Mass so frequently that it was difficult to celebrate. He died at thirty-three and was canonized by Pope Pius IX in 1862.", quote: "Give me more love for the Most Holy Sacrament.", quoteAttr: "Attributed to Saint Michael de Sanctis" }],
  "04-11": [{ name: "Saint Stanislaus of Krak\u00f3w", titles: "Bishop and Martyr, Patron of Poland", era: "1030\u20131079", region: "Poland", tags: ["Martyr"], bio: "Stanislaus was Bishop of Krak\u00f3w who excommunicated the cruel King Boles\u0142aw II for his tyranny and violation of church rights. The king personally killed him at the altar while he was celebrating Mass. He is patron of Poland and his martyrdom is often compared to that of Saint Thomas Becket.", quote: "I do not fear your threats. I have a greater fear of the judgment of God.", quoteAttr: "Attributed to Saint Stanislaus to King Boles\u0142aw" }],
  "04-12": [{ name: "Saint Julius I", titles: "Pope", era: "d. 352", region: "Rome", tags: ["Confessor"], bio: "Julius I was Bishop of Rome from 337 to 352 and the great defender of Saint Athanasius against the Arians. When Arian-controlled Eastern councils deposed Athanasius, Julius I received him in Rome and convened the Council of Sardica in 343, which reaffirmed Nicene orthodoxy and established the principle of papal appeals in the Western Church.", quote: "The Catholic faith is not to be decided by councils but by the see of Peter.", quoteAttr: "Attributed to Saint Julius I" }],
  "04-13": [{ name: "Saint Martin I", titles: "Pope and Martyr", era: "d. 655", region: "Rome / Crimea", tags: ["Martyr"], bio: "Martin I condemned the Monothelite heresy at the Lateran Council of 649. Emperor Constans II had him arrested, transported to Constantinople, publicly humiliated, and exiled to Cherson in the Crimea, where he died of starvation and mistreatment. He is the last pope venerated as a martyr in the Western Church.", quote: "No persecution can tear from me the name of Catholic.", quoteAttr: "Saint Martin I, from exile" }],
  "04-14": [{ name: "Saint Lidwine of Schiedam", titles: "Virgin and Mystic", era: "1380\u20131433", region: "Schiedam, Holland", tags: ["Confessor"], bio: "Lidwine suffered a fall on the ice at fifteen that left her bedridden for thirty-eight years of progressive physical deterioration. She is said to have received the stigmata and to have offered her suffering for the souls in purgatory and for the unity of the Church during the Western Schism. She was beatified in 1890.", quote: "I will not remove the cross of my Lord from my shoulders.", quoteAttr: "Attributed to Saint Lidwine of Schiedam" }],
  "04-15": [{ name: "Blessed Caesar de Bus", titles: "Priest, Founder of the Doctrinaires", era: "1544\u20131607", region: "Provence, France", tags: ["Confessor"], bio: "Caesar de Bus was a soldier and courtier who converted after a serious illness. He founded the Congregation of the Fathers of Christian Doctrine \u2014 the Doctrinaires \u2014 dedicated to catechesis of the rural poor at a time of widespread religious ignorance. He was beatified by Pope John Paul II in 1975.", quote: "The faith is not lost through persecution alone; it is lost through ignorance.", quoteAttr: "Blessed Caesar de Bus" }],
